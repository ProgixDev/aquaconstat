<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="./support.js"></script>
  </head>
  <body>
    <x-dc>
      <helmet data-dc-atomics>
        <title>Connexion — Administration AquaConstat</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous" />
        <link
          href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&amp;family=Nunito:ital,wght@0,400;0,600;1,400&amp;display=swap"
          rel="stylesheet"
        />
        <style>
          body {
            margin: 0;
            background: #eaf4fe;
            font-family: "Nunito", system-ui, sans-serif;
            color: #133a5f;
            -webkit-font-smoothing: antialiased;
          }
          a {
            color: #2e7fc2;
            text-decoration: none;
          }
          a:hover {
            color: #1d5688;
          }
          a:focus-visible,
          button:focus-visible,
          input:focus-visible {
            outline: 3px solid rgba(90, 169, 230, 0.55);
            outline-offset: 2px;
            border-radius: 6px;
          }
          input::placeholder {
            color: #8aa9c6;
          }
        </style>
      </helmet>
      <div
        style="
          min-height: 100vh;
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          padding: 24px;
          box-sizing: border-box;
        "
      >
        <div style="display: flex; align-items: center; gap: 11px">
          <span
            style="
              display: inline-block;
              width: 13px;
              height: 13px;
              border-radius: 0 50% 50% 50%;
              transform: rotate(45deg);
              background: linear-gradient(135deg, #7fc8f8, #5aa9e6);
            "
          ></span>
          <span
            style="
              font-family: &quot;Playfair Display&quot;;
              font-size: 14.5px;
              letter-spacing: 0.14em;
              color: #133a5f;
            "
            >AQUACONSTAT</span
          >
        </div>
        <div
          style="
            margin-top: 26px;
            width: 100%;
            max-width: 400px;
            background: #f9f9f9;
            border: 1px solid #d5e7f7;
            border-radius: 20px;
            padding: 32px;
            box-sizing: border-box;
            box-shadow:
              0 2px 5px rgba(15, 45, 80, 0.05),
              0 24px 44px -24px rgba(15, 45, 80, 0.18);
          "
        >
          <h1
            style="
              margin: 0;
              font-family: &quot;Playfair Display&quot;;
              font-weight: 700;
              font-size: 21px;
            "
          >
            Espace administration
          </h1>
          <div style="margin-top: 22px; display: flex; flex-direction: column; gap: 16px">
            <label
              style="
                display: flex;
                flex-direction: column;
                gap: 7px;
                font-size: 13.5px;
                font-weight: 600;
              "
              >E-mail
              <input
                type="email"
                defaultValue="pro@aquaconstat.fr"
                style="
                  padding: 13px 14px;
                  border: 1px solid #bbd9f0;
                  border-radius: 12px;
                  background: #ffffff;
                  font-family: &quot;Nunito&quot;;
                  font-size: 15px;
                  color: #133a5f;
                "
                style-focus="border-color:#2E7FC2;box-shadow:0 0 0 3px rgba(127,200,248,.28)"
              />
            </label>
            <label
              style="
                display: flex;
                flex-direction: column;
                gap: 7px;
                font-size: 13.5px;
                font-weight: 600;
              "
              >Mot de passe
              <input
                type="password"
                defaultValue="••••••••••"
                style="
                  padding: 13px 14px;
                  border: 1px solid #bbd9f0;
                  border-radius: 12px;
                  background: #ffffff;
                  font-family: &quot;Nunito&quot;;
                  font-size: 15px;
                  color: #133a5f;
                "
                style-focus="border-color:#2E7FC2;box-shadow:0 0 0 3px rgba(127,200,248,.28)"
              />
            </label>
            <sc-if value="{{ err }}" hint-placeholder-val="{{ false }}">
              <div
                style="
                  border: 1.5px solid #e2b4ae;
                  border-radius: 12px;
                  background: #fdf6f5;
                  padding: 12px 16px;
                  font-size: 13.5px;
                  line-height: 1.55;
                  color: #b0473b;
                "
              >
                <strong>Identifiants incorrects.</strong> Vérifiez l’e-mail et le mot de passe, puis
                réessayez.
              </div>
            </sc-if>
            <a
              href="admin-dossiers.dc.html"
              style="
                display: flex;
                justify-content: center;
                background: #ffe45e;
                color: #133a5f;
                font-weight: 600;
                font-size: 15px;
                padding: 15px 28px;
                border-radius: 12px;
                box-shadow: 0 14px 28px -14px rgba(9, 32, 58, 0.45);
              "
              >Se connecter</a
            >
          </div>
        </div>
        <div style="margin-top: 18px; font-size: 12.5px; color: #8aa9c6">
          Accès réservé · un problème de connexion&nbsp;?
          <a href="admin-connexion.dc.html" style="color: #567292; text-decoration: underline"
            >Contacter Progix</a
          >
        </div>
      </div>
    </x-dc>
    <script
      type="text/x-dc"
      data-dc-script
      data-props='{"$preview": {"width": 1024, "height": 720}, "identifiantsIncorrects": {"editor": "boolean", "default": false, "tsType": "boolean", "section": "États"}}'
    >
      class Component extends DCLogic {
        renderVals() { return { err: !!(this.props.identifiantsIncorrects ?? false) }; }
      }
    </script>
  </body>
</html>
