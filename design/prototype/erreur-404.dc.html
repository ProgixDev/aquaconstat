<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="./support.js"></script>
  </head>
  <body>
    <x-dc>
      <helmet data-dc-atomics>
        <title>Page introuvable — AquaConstat</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link
          href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&amp;family=Nunito:wght@400;600&amp;display=swap"
          rel="stylesheet"
        />
        <style>
          body {
            margin: 0;
            background: #eaf4fe;
            font-family: "Nunito", system-ui, sans-serif;
            color: #133a5f;
            -webkit-font-smoothing: antialiased;
          }
          a {
            color: #2e7fc2;
            text-decoration: none;
          }
          a:hover {
            color: #1d5688;
          }
          a:focus-visible {
            outline: 3px solid rgba(90, 169, 230, 0.55);
            outline-offset: 2px;
            border-radius: 6px;
          }
        </style>
      </helmet>
      <div
        style="
          min-height: 100vh;
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          text-align: center;
          padding: 24px;
          box-sizing: border-box;
        "
      >
        <span
          style="
            display: inline-block;
            width: 16px;
            height: 16px;
            border-radius: 0 50% 50% 50%;
            transform: rotate(45deg);
            background: #bbd9f0;
          "
        ></span>
        <div
          style="
            margin-top: 26px;
            font-family: &quot;Playfair Display&quot;;
            font-size: clamp(64px, 10vw, 96px);
            letter-spacing: 0.12em;
            color: #1c4570;
          "
        >
          404
        </div>
        <p
          style="
            margin: 10px 0 0;
            font-size: 16px;
            line-height: 1.7;
            color: #446c93;
            max-width: 380px;
          "
        >
          Cette page n’existe pas — retour à l’accueil.
        </p>
        <a
          href="accueil.dc.html"
          style="
            margin-top: 26px;
            display: inline-block;
            background: #ffe45e;
            color: #133a5f;
            font-weight: 600;
            font-size: 14.5px;
            padding: 14px 28px;
            border-radius: 999px;
            box-shadow: 0 14px 28px -14px rgba(9, 32, 58, 0.45);
          "
          >Retour à l’accueil</a
        >
        <div style="margin-top: 40px; display: flex; align-items: center; gap: 10px; opacity: 0.7">
          <span
            style="
              display: inline-block;
              width: 10px;
              height: 10px;
              border-radius: 0 50% 50% 50%;
              transform: rotate(45deg);
              background: linear-gradient(135deg, #7fc8f8, #5aa9e6);
            "
          ></span>
          <span
            style="
              font-family: &quot;Playfair Display&quot;;
              font-size: 12px;
              letter-spacing: 0.14em;
              color: #567292;
            "
            >AQUACONSTAT</span
          >
        </div>
      </div>
    </x-dc>
    <script
      type="text/x-dc"
      data-dc-script
      data-props='{"$preview": {"width": 1024, "height": 640}}'
    ></script>
  </body>
</html>
